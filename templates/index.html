{% extends "base.html" %}

{% block title %}TIR{% endblock %}

{% block content %}
<main class="container" style="padding: 2rem 0;">
    <div class="welcome-section" style="text-align: center; padding: 3rem 1rem; margin-bottom: 2rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Welcome to TIR</h1>
        <p class="text-secondary" style="font-size: 1.125rem; max-width: 600px; margin: 0 auto 2rem;">Your task and inventory management system</p>
        <div class="flex" style="justify-content: center; gap: 1rem;">
            <a href="/tasks" class="btn btn-primary">View Tasks</a>
            <a href="/customers" class="btn btn-ghost">Customers</a>
            <a href="/items" class="btn btn-ghost">Items</a>
        </div>
    </div>

    <div class="stats-grid">
        <a href="/customers" class="stat-card">
            <div class="stat-icon" style="background: rgba(99, 102, 241, 0.15); color: #818cf8;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="stat-info">
                <span class="stat-value">{{ customer_count }}</span>
                <span class="stat-label">Customers</span>
            </div>
        </a>

        <a href="/items" class="stat-card">
            <div class="stat-icon" style="background: rgba(34, 197, 94, 0.15); color: #4ade80;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <div class="stat-info">
                <span class="stat-value">{{ item_count }}</span>
                <span class="stat-label">Items</span>
            </div>
        </a>

        <a href="/tasks" class="stat-card">
            <div class="stat-icon" style="background: rgba(245, 158, 11, 0.15); color: #fbbf24;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            </div>
            <div class="stat-info">
                <span class="stat-value">{{ task_count }}</span>
                <span class="stat-label">Active Tasks</span>
            </div>
        </a>

        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(34, 197, 94, 0.15); color: #4ade80;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 22 10 16 10"/></svg>
            </div>
            <div class="stat-info">
                <span class="stat-value">{{ done_count }}</span>
                <span class="stat-label">Completed</span>
            </div>
        </div>
    </div>
</main>

<style>
.stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
}

.stat-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.5rem;
    background: var(--bg-surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-xl);
    text-decoration: none;
    transition: all 0.2s ease;
}

.stat-card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
}

.stat-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.stat-info {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1;
}

.stat-label {
    font-size: 0.875rem;
    color: var(--text-muted);
}
</style>
{% endblock %}
