{% extends "base.html" %}

{% block title %}Edit Customer - TIR{% endblock %}

{% block content %}
<main class="container" style="padding: 2rem 0;">
    <h1>Edit Customer</h1>
    <div class="card" style="max-width: 600px; margin-top: 1rem;">
        <form action="/customers/edit/{{ customer.id }}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" value="{{ customer.name }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ customer.email or '' }}">
            </div>
            <div class="form-group">
                <label for="image">Image</label>
                {% if customer.image %}
                <div style="margin-bottom: 0.5rem;">
                    <img src="/static/{{ customer.image }}" alt="{{ customer.name }}" style="width: 100px; height: 100px; object-fit: cover; border-radius: var(--radius-md);">
                </div>
                {% endif %}
                <input type="file" id="image" name="image" accept="image/*">
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4">{{ customer.description or '' }}</textarea>
            </div>
            <div class="flex" style="gap: 0.5rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/customers" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</main>
{% endblock %}
