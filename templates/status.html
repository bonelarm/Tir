{% extends "base.html" %}

{% block title %}Status - TIR{% endblock %}

{% block content %}
<main class="container" style="padding: 2rem 0;">
    <h1>Status</h1>
    <div class="grid grid-2" style="gap: 1rem; margin-top: 1.5rem;">
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Database Status</p>
            <p style="margin-bottom: 0;">
                <span id="status" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">Loading...</span>
            </p>
        </div>
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Customers</p>
            <p style="margin-bottom: 0;">
                <span id="customerCount" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">-</span>
            </p>
        </div>
    </div>
</main>

<script>
    async function fetchStatus() {
        try {
            const res = await fetch('/health');
            const data = await res.json();
            document.getElementById('status').textContent = data.status;
            document.getElementById('customerCount').textContent = data.customer_count || 0;
        } catch {
            document.getElementById('status').textContent = 'Error';
            document.getElementById('customerCount').textContent = '-';
        }
    }
    fetchStatus();
</script>
{% endblock %}
