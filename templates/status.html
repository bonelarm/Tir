{% extends "base.html" %}

{% block title %}Status - TIR{% endblock %}

{% block content %}
<main class="container" style="padding: 2rem 0;">
    <div class="flex items-center justify-between" style="margin-bottom: 1.5rem;">
        <h1>Status</h1>
        <button onclick="fetchStatus()" class="btn btn-ghost btn-sm" id="refreshBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            Refresh
        </button>
    </div>

    <div class="grid grid-3" style="gap: 1rem; margin-bottom: 1.5rem;">
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Version</p>
            <p style="margin-bottom: 0;">
                <span class="text-primary" style="font-size: 1.25rem; font-weight: 600;">2.0</span>
            </p>
        </div>
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Database Status</p>
            <p style="margin-bottom: 0;">
                <span id="statusBadge" class="status-badge status-loading">Loading...</span>
            </p>
        </div>
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Response Time</p>
            <p style="margin-bottom: 0;">
                <span id="responseTime" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">-</span>
            </p>
        </div>
    </div>

    <div class="grid grid-4" style="gap: 1rem; margin-bottom: 1.5rem;">
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Customers</p>
            <p style="margin-bottom: 0;">
                <span id="customerCount" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">-</span>
            </p>
        </div>
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Tasks</p>
            <p style="margin-bottom: 0;">
                <span id="taskCount" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">-</span>
            </p>
        </div>
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">Items</p>
            <p style="margin-bottom: 0;">
                <span id="itemCount" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">-</span>
            </p>
        </div>
        <div class="card">
            <p class="text-sm text-muted" style="margin-bottom: 0.5rem;">DB Size</p>
            <p style="margin-bottom: 0;">
                <span id="dbSize" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">-</span>
            </p>
        </div>
    </div>

    <div class="card" style="margin-bottom: 1.5rem;">
        <div class="flex items-center justify-between" style="margin-bottom: 1rem;">
            <p class="text-sm text-muted" style="margin-bottom: 0;">System Uptime</p>
            <span id="lastCheck" class="text-xs text-muted"></span>
        </div>
        <p style="margin-bottom: 0;">
            <span id="uptime" class="text-primary" style="font-size: 1.25rem; font-weight: 600;">-</span>
        </p>
    </div>
</main>

<style>
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: 0.25rem 0.75rem;
        border-radius: var(--radius-full);
        font-size: var(--text-sm);
        font-weight: 600;
        line-height: 1.5;
    }
    .status-healthy {
        background: rgba(74, 222, 128, 0.15);
        color: #4ade80;
        border: 1px solid rgba(74, 222, 128, 0.3);
    }
    .status-error {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .status-unknown {
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.3);
    }
    .status-loading {
        background: var(--bg-elevated);
        color: var(--text-muted);
        border: 1px solid var(--border);
    }
    .status-badge::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    .spinning {
        animation: spin 0.75s linear infinite;
    }
</style>

<script>
    async function fetchStatus() {
        const btn = document.getElementById('refreshBtn');
        const statusBadge = document.getElementById('statusBadge');
        try {
            btn.querySelector('svg').classList.add('spinning');
            statusBadge.className = 'status-badge status-loading';
            statusBadge.textContent = 'Checking...';

            const res = await fetch('/health');
            const data = await res.json();

            statusBadge.textContent = data.status;
            if (data.status === 'healthy') {
                statusBadge.className = 'status-badge status-healthy';
            } else if (data.status === 'error') {
                statusBadge.className = 'status-badge status-error';
            } else {
                statusBadge.className = 'status-badge status-unknown';
            }

            document.getElementById('customerCount').textContent = data.customer_count || 0;
            document.getElementById('taskCount').textContent = data.task_count || 0;
            document.getElementById('itemCount').textContent = data.item_count || 0;
            document.getElementById('dbSize').textContent = (data.db_size_kb || 0) + ' KB';
            document.getElementById('uptime').textContent = data.uptime || '-';
            document.getElementById('responseTime').textContent = (data.response_time_ms || 0) + ' ms';
            document.getElementById('lastCheck').textContent = 'Last checked: ' + new Date().toLocaleTimeString();
        } catch {
            statusBadge.textContent = 'Error';
            statusBadge.className = 'status-badge status-error';
            document.getElementById('customerCount').textContent = '-';
            document.getElementById('taskCount').textContent = '-';
            document.getElementById('itemCount').textContent = '-';
            document.getElementById('dbSize').textContent = '-';
            document.getElementById('uptime').textContent = '-';
            document.getElementById('responseTime').textContent = '-';
        } finally {
            btn.querySelector('svg').classList.remove('spinning');
        }
    }
    fetchStatus();
</script>
{% endblock %}
